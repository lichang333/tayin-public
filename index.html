<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踏印 · 中国打卡地图</title>
<meta name="description" content="一地一印 —— 积木拼出真实轮廓的中国打卡地图，记录你到访每座城市的深浅">
<meta name="theme-color" content="#E7E0D0">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="踏印">
<style>
  :root {
    --paper: #E7E0D0;
    --land: #FBF8F1;
    --ink: #1B2430;
    --text-mid: #586572;
    --copper: #A9702F;
    --l1: #C89F63; --l2: #B88749; --l3: #A16829; --l4: #834F1D; --l5: #613813;
  }
  /* 寒蝉圆体 Bold（思源黑体圆角化，OFL）：默认地名字体，圆润亲和 */
  @font-face { font-family: 'MapRound'; src: url('./round-map.woff2?v=1') format('woff2'); font-weight: 700; font-display: swap; }
  /* 思源宋体 Black（子集）：留档变体，?font=serif 切回 */
  @font-face { font-family: 'MapSerif'; src: url('./serif-map.woff2?v=3') format('woff2'); font-weight: 900; font-display: swap; }
  .font-serif .rlabel, .font-serif .dfrac { font-family: 'MapSerif', 'Songti SC', serif; font-weight: 900; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 26px 12px 48px; position: relative;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; margin-top: 4px; }
  .brand-seal {
    width: 46px; height: 46px; border-radius: 11px;
    border: 2px solid var(--copper); background: var(--copper);
    color: #FFF6E8; font-family: 'Songti SC','Noto Serif SC',serif;
    font-size: 24px; font-weight: 700; display: grid; place-items: center;
    transform: rotate(-5deg); box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  h1 { font-family: 'Songti SC','Noto Serif SC',serif; font-size: 30px; color: var(--ink); letter-spacing: 0.06em; }
  .tagline { font-size: 12.5px; color: var(--text-mid); font-weight: 600; margin: 6px 0 3px; }
  .score { font-family: 'Songti SC',serif; font-size: 22px; font-weight: 700; color: var(--copper); margin-bottom: 12px; }
  .score small { font-size: 12px; color: var(--text-mid); font-weight: 600; }

  /* 图例排在地图上方的一条（不再浮在地图上，避免挡住左上角的地块） */
  .legend { display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 4px 13px; width: fit-content; margin: 0 auto 8px; padding: 5px 12px;
    background: rgba(251,248,241,0.9); border: 1.3px solid var(--ink); border-radius: 9px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .lg-row { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--ink); }
  .lg-sw { width: 16px; height: 11px; border: 1.3px solid var(--ink); border-radius: 3px; flex-shrink: 0; }
  .lg-sw.lv0 { background: var(--land); }
  .lg-sw.lv1 { background: var(--l1); } .lg-sw.lv2 { background: var(--l2); }
  .lg-sw.lv3 { background: var(--l3); } .lg-sw.lv4 { background: var(--l4); } .lg-sw.lv5 { background: var(--l5); }
  .lg-lv { color: var(--text-mid); font-weight: 600; }

  .stage { position: relative; max-width: 1040px; width: 100%; overflow: hidden; }
  svg { width: 100%; height: auto; max-height: 86vh; display: block; overflow: hidden; touch-action: pan-y; }
  .zoombar { position: absolute; right: 8px; bottom: 8px; z-index: 8; display: flex; flex-direction: column; gap: 6px; }
  .zoombar button { width: 34px; height: 34px; border-radius: 999px; border: 1.3px solid var(--ink);
    background: rgba(251,248,241,0.92); color: var(--ink); font-size: 20px; font-weight: 700; line-height: 1;
    display: grid; place-items: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15); padding: 0; }
  .zoombar button:hover { background: #EFE9DB; }

  .cellpoly {
    fill: var(--land); stroke: var(--ink); stroke-width: 1.1;
    stroke-linejoin: round; cursor: pointer; transition: filter 0.12s ease;
  }
  .cellpoly:hover { filter: brightness(0.93); }
  .cellpoly.lv1 { fill: var(--l1); } .cellpoly.lv2 { fill: var(--l2); }
  .cellpoly.lv3 { fill: var(--l3); } .cellpoly.lv4 { fill: var(--l4); } .cellpoly.lv5 { fill: var(--l5); }
  .cellpoly.hl { stroke-width: 2; filter: brightness(0.9); }

  .tip {
    position: fixed; z-index: 70; pointer-events: none; display: none;
    background: var(--ink); color: #FFF6E8; font-size: 12.5px; font-weight: 700;
    padding: 5px 10px; border-radius: 7px; white-space: nowrap; box-shadow: 0 3px 10px rgba(0,0,0,0.28);
  }
  .tip.show { display: block; }
  .tip small { font-weight: 600; opacity: 0.82; margin-left: 5px; }

  .rlabel { font-family: 'MapRound', 'PingFang SC', sans-serif; font-weight: 700; fill: var(--ink); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
  .rlabel.lv3, .rlabel.lv4, .rlabel.lv5 { fill: #FFF6E8; }

  .dmark { fill: var(--copper); opacity: 0.55; text-anchor: end; pointer-events: none; font-weight: 700; }
  .dmark.lv3, .dmark.lv4, .dmark.lv5 { fill: #FFF6E8; }

  .dfrac { font-family: 'MapRound', 'PingFang SC', sans-serif; fill: var(--copper); text-anchor: middle; dominant-baseline: central; pointer-events: none; font-weight: 700; letter-spacing: 0.02em; }
  .dfrac.lv3, .dfrac.lv4, .dfrac.lv5 { fill: #FFF6E8; opacity: 0.92; }

  .popup {
    position: fixed; background: #FFFDF8; border: 1.3px solid var(--ink);
    border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    z-index: 60; min-width: 150px; overflow: hidden; display: none;
  }
  .popup.open { display: block; }
  .pp-title { font-size: 13px; font-weight: 800; color: var(--ink); padding: 8px 12px; background: var(--paper); border-bottom: 1.3px solid var(--ink); }
  button.pp-title { width: 100%; text-align: left; border-top: none; border-left: none; border-right: none; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #FBF3E4; transition: background 0.15s; }
  button.pp-title:hover { background: #F1E3C6; }
  .pp-sub { font-size: 11px; font-weight: 700; color: var(--copper); white-space: nowrap; background: #FFFDF8; border: 1.3px solid var(--copper); border-radius: 999px; padding: 2px 9px; transition: all 0.15s; }
  button.pp-title:hover .pp-sub { background: var(--copper); color: #FFF6E8; }
  .pp-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 12px; border: none; background: transparent; font-size: 13px; font-weight: 700; color: var(--ink); cursor: pointer; text-align: left; }
  .pp-item:hover { background: #EFE9DB; }
  .pp-item .lg-sw { width: 18px; height: 12px; }
  .pp-item.current { background: #E8E0CC; }
  .pp-guide { display: flex; align-items: center; gap: 9px; padding: 9px 12px;
    text-decoration: none; border-bottom: 1.3px dashed var(--ink);
    background: #FBF3E4; transition: background 0.15s; }
  .pp-guide:hover { background: #F1E3C6; }
  .ppg-book { font-size: 17px; flex-shrink: 0; }
  .ppg-main { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .ppg-main b { font-size: 13px; font-weight: 800; color: var(--ink); }
  .ppg-main small { font-size: 11px; font-weight: 700; color: var(--copper); }
  .ppg-arrow { font-size: 16px; font-weight: 800; color: var(--copper); flex-shrink: 0; }
  .gmark { pointer-events: none; }

  .actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    font-size: 13px; font-weight: 700; color: var(--ink);
    background: var(--land); border: 1.3px solid var(--ink);
    border-radius: 9px; padding: 8px 16px; cursor: pointer; transition: background 0.15s;
  }
  .btn:hover { background: #EFE9DB; }
  .actbar { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
  .actbtn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
    color: var(--ink); background: var(--land); border: 1.3px solid var(--ink); border-radius: 999px;
    padding: 7px 17px; cursor: pointer; transition: background .15s, box-shadow .15s; }
  .actbtn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.9;
    stroke-linecap: round; stroke-linejoin: round; }
  .actbtn:hover { background: #EFE9DB; }
  .actbtn.primary { background: var(--copper); border-color: var(--copper); color: #FFF6E8; }
  .actbtn.primary:hover { background: #966029; box-shadow: 0 3px 12px rgba(169,112,47,.32); }
  .actbtn:disabled { opacity: 0.55; cursor: default; }
  .toast { position: fixed; left: 50%; bottom: 40px; transform: translate(-50%, 12px);
    background: var(--ink); color: #FFF6E8; font-size: 13px; font-weight: 700; padding: 9px 16px;
    border-radius: 999px; box-shadow: 0 4px 14px rgba(0,0,0,0.28); z-index: 90; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  /* 微信内浏览器：无系统分享面板且禁下载，全屏展示生成图让用户长按转发/保存 */
  .shot-mask { position: fixed; inset: 0; z-index: 100; background: rgba(27,36,48,.82);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 13px; padding: 22px; }
  .shot-mask.open { display: flex; }
  .shot-mask img { max-width: 100%; max-height: 74vh; border-radius: 10px; box-shadow: 0 10px 34px rgba(0,0,0,.45); }
  .shot-hint { color: #FFF6E8; font-size: 15px; font-weight: 700; }
  .shot-sub { color: rgba(255,246,232,.6); font-size: 12px; font-weight: 600; }
  .foot { margin-top: 14px; font-size: 12px; color: var(--text-mid); font-weight: 600; text-align: center; line-height: 1.6; }
  .foot a { color: var(--copper); text-decoration: none; }
  .help-toggle { cursor: pointer; opacity: 0.85; white-space: nowrap; }
  .help-toggle:hover { opacity: 1; }
  .foot-help { margin-top: 6px; max-width: 620px; font-size: 11.5px; color: var(--text-mid);
    line-height: 1.7; text-align: center; opacity: 0.9; }
  .foot-help b { color: var(--copper); font-weight: 700; }

  .tabs { display: flex; flex-wrap: nowrap; justify-content: flex-start; gap: 7px; margin-bottom: 10px;
    max-width: 1040px; width: 100%; overflow-x: auto; scrollbar-width: none; padding: 2px 2px;
    -webkit-mask-image: linear-gradient(90deg, #000 94%, transparent);
    mask-image: linear-gradient(90deg, #000 94%, transparent); }
  .tabs::-webkit-scrollbar { display: none; }
  .tabsbar { position: relative; display: flex; justify-content: center; width: 100%; max-width: 1040px; margin-bottom: 10px; }
  .tabsbar .tabs { margin-bottom: 0; }
  .tab-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 4;
    width: 26px; height: 26px; border-radius: 50%; border: 1.3px solid var(--ink); background: var(--land);
    color: var(--ink); font-size: 15px; line-height: 1; display: none; place-items: center; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18); padding: 0; }
  .tab-nav.show { display: grid; }
  .tab-nav:hover { background: #EFE9DB; }
  .tab-nav.left { left: -2px; }
  .tab-nav.right { right: -2px; }
  .tab {
    font-size: 12.5px; font-weight: 700; color: var(--ink);
    background: var(--land); border: 1.3px solid var(--ink); flex: 0 0 auto;
    border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: background 0.15s;
  }
  .tab:hover { background: #EFE9DB; }
  .tab.active { background: var(--copper); border-color: var(--copper); color: #FFF6E8; }
  .tab small { font-weight: 600; opacity: 0.75; margin-left: 3px; }
  .tdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }
  .tab.active .tdot { display: none; }
  /* 面包屑里的「当前组」胶囊：延续标签栏激活态样式（组色底+进度），标识当前位置，不可点 */
  .crumb-pill { font-size: 12.5px; font-weight: 700; color: #FFF6E8; border-radius: 999px; padding: 5px 12px; }
  .crumb-pill small { font-weight: 600; opacity: 0.8; margin-left: 4px; }

  /* 账号控件：右上角，不占中间 */
  .userbar { position: absolute; top: 14px; right: 14px; z-index: 20; display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--text-mid); }
  .userbar .uname { color: var(--copper); }
  .uicon { width: 25px; height: 25px; border-radius: 999px; border: 1.3px solid var(--ink); background: var(--land); color: var(--ink); font-size: 13px; display: grid; place-items: center; cursor: pointer; padding: 0; }
  .uicon:hover { background: #EFE9DB; }
  .uauth { border: 1.3px solid var(--ink); background: var(--land); color: var(--ink); border-radius: 999px; padding: 4px 13px; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
  .uauth:hover { background: #EFE9DB; }
  .userbar .uname { color: var(--copper); }
  .btn.small { font-size: 12px; padding: 5px 12px; border-radius: 8px; }

  .modal-mask {
    position: fixed; inset: 0; background: rgba(27,36,48,0.45);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px;
  }
  .modal-mask.open { display: flex; }
  .modal {
    background: #FFFDF8; border: 1.3px solid var(--ink); border-radius: 14px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3); width: 100%; max-width: 320px; overflow: hidden;
  }
  .md-title { font-family: 'Songti SC','Noto Serif SC',serif; font-size: 17px; font-weight: 800; color: var(--ink); padding: 12px 18px; background: var(--paper); border-bottom: 1.3px solid var(--ink); }
  .md-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
  .md-body input {
    font: inherit; font-size: 14px; font-weight: 600; color: var(--ink);
    background: var(--land); border: 1.3px solid var(--ink); border-radius: 9px; padding: 9px 12px; outline: none;
  }
  .md-body input:focus { border-color: var(--copper); }
  .md-msg { font-size: 12px; font-weight: 700; color: #A0392E; min-height: 15px; }
  .md-btns { display: flex; gap: 10px; }
  .md-btns .btn { flex: 1; }
  .btn.primary { background: var(--copper); color: #FFF6E8; border-color: var(--copper); }
  .btn.primary:hover { background: #8F5C25; }
  .md-hint { font-size: 11.5px; color: var(--text-mid); font-weight: 600; line-height: 1.5; }

  /* 返回导航条：返回键靠左、分区名紧随、进度靠右，细线分隔地图 */
  .crumb { display: none; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px 12px;
    margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #CBC2AF; max-width: 1040px; width: 100%; }
  .crumb.show { display: flex; }
  .crumb-l { display: flex; align-items: center; gap: 10px; }
  .crumb-title { font-family: 'Songti SC','Noto Serif SC',serif; font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .crumb .back {
    cursor: pointer; border: 1.3px solid var(--ink); background: var(--land);
    border-radius: 999px; padding: 5px 13px; font: inherit; font-size: 12.5px; font-weight: 700; color: var(--ink);
  }
  .crumb .back:hover { background: #EFE9DB; }
  .crumb .cscore { color: var(--text-mid); font-size: 12px; font-weight: 700; }
  .crumb .cscore b { color: var(--copper); }

  /* iPad 及以下：地图占满宽度，纵向不超一屏 */
  @media (max-width: 900px) {
    svg { max-height: 72vh; }
  }
  /* iPhone：收紧留白与字号，地图近乎贴边、尽量大 */
  @media (max-width: 640px) {
    body { padding: 16px 6px 40px; }
    .brand { gap: 9px; }
    .brand-seal { width: 40px; height: 40px; font-size: 21px; }
    h1 { font-size: 25px; }
    .tagline { font-size: 12px; }
    .score { font-size: 19px; }
    .userbar { top: 10px; right: 8px; font-size: 11.5px; gap: 6px; }
    .tab { font-size: 11.5px; padding: 4px 9px; }
    .tabs { gap: 6px; margin-bottom: 12px; }
    .legend { gap: 5px 11px; }
    .lg-row { font-size: 11.5px; }
    .lg-sw { width: 18px; height: 12px; }
    svg { max-height: 66vh; }
    .foot { font-size: 11px; }
    .popup { min-width: 140px; }
  }
  /* 窄屏 iPhone mini/SE */
  @media (max-width: 380px) {
    h1 { font-size: 22px; }
    .brand-seal { width: 36px; height: 36px; font-size: 19px; }
    .tab { font-size: 11px; padding: 3.5px 8px; }
  }
</style>
</head>
<body>
  <div class="brand">
    <div class="brand-seal">印</div>
    <h1>踏印</h1>
  </div>
  <p class="tagline">一地一印 —— 中国打卡地图</p>
  <div class="score"><span id="score">0</span><small> 分 · <span id="touched">0</span>/<span id="totaln">0</span> 地</small></div>

  <div class="userbar" id="userbar"></div>

  <div class="tabsbar" id="tabsbar">
    <button class="tab-nav left" id="tab-left" aria-label="向左滚动">‹</button>
    <div class="tabs" id="tabs"></div>
    <button class="tab-nav right" id="tab-right" aria-label="向右滚动">›</button>
  </div>

  <div class="crumb" id="crumb"></div>

  <div class="stage">
    <div class="legend" id="legend"></div>
    <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="zoombar">
      <button id="zoom-in" aria-label="放大">＋</button>
      <button id="zoom-out" aria-label="缩小">－</button>
    </div>
    <div class="popup" id="popup"></div>
    <div class="tip" id="tip"></div>
  </div>

  <div class="actbar">
    <button class="actbtn" id="save-img"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v8.5"/><path d="M8.5 9.5 12 13l3.5-3.5"/><path d="M7 12H5v8h14v-8h-2"/></svg>存图</button>
    <button class="actbtn primary" id="share-img"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 13V4"/><path d="M8.5 7.5 12 4l3.5 3.5"/><path d="M7 12H5v8h14v-8h-2"/></svg>分享</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="shot-mask" id="shot-mask">
    <img id="shot-img" alt="分享图">
    <div class="shot-hint" id="shot-hint">长按图片 · 发送给朋友或保存</div>
    <div class="shot-sub">点空白处关闭</div>
  </div>

  <p class="foot">
    <span id="prov-line"></span>　·　<span>📖 = 已有城市攻略</span>　·　<span id="storage-hint">数据存于本机浏览器</span>
    　·　<a href="javascript:void 0" id="help-toggle" class="help-toggle">用法 ▾</a>
  </p>
  <div class="foot-help" id="foot-help" hidden>
    点击地块选到访等级：住过 5 · 住宿 4 · 玩过 3 · 途经 2 · 落地 1 · 未踏 0。<br>
    带 <b>▦</b> 的可细分：点开后按标题栏胶囊进入，或双击直入。<br>
    全国图点<b>广东 / 港澳</b>会进「大湾区」，其印记与闽粤桂共享、总分去重。
  </div>

  <div class="modal-mask" id="auth-mask">
    <div class="modal">
      <div class="md-title">印主登记</div>
      <div class="md-body">
        <input id="auth-user" type="text" placeholder="用户名 / 邮箱（与 Sakura Tour 通用）" maxlength="40" autocomplete="username">
        <input id="auth-pass" type="password" placeholder="密码（至少 6 位）" maxlength="72" autocomplete="current-password">
        <div class="md-msg" id="auth-msg"></div>
        <div class="md-btns">
          <button class="btn primary" id="auth-login">登录</button>
          <button class="btn" id="auth-register">注册</button>
        </div>
        <div class="md-hint">不登录也能玩，记录存在本机浏览器；登录后记录保存到账号，换设备不丢。首次登录会自动合并本机已有的印记。</div>
      </div>
    </div>
  </div>

<script>
  // API 地址：本地开发同源留空；部署到 GitHub Pages 等其它域名时指向后端
  window.TAYIN_API = /^(localhost|127\.0\.0\.1)?$/.test(location.hostname) ? '' : 'https://tayin.digitalvio.shop'
</script>
<script src="./tile-geo.js?v=15"></script>
<script src="./drill-geo.js?v=15"></script>
<script>
const LEVELS = [
  { v:5, label:'住过 · 居住过' }, { v:4, label:'住宿 · 过夜旅行' },
  { v:3, label:'玩过 · 游玩到访' }, { v:2, label:'途经 · 路过没停留' },
  { v:1, label:'落地 · 仅中转' }, { v:0, label:'未踏 · 还没去过' },
]
const CELL = 26
const GROUPS = TILE_GEO.groups
const DRILL = typeof DRILL_GEO !== 'undefined' ? DRILL_GEO : {}
const ALL_REGIONS = GROUPS.flatMap(g => g.regions)
// 大湾区与闽粤桂共享 code，总分按去重后的单位计
const UNIQ_CODES = [...new Set(ALL_REGIONS.map(r => r.code))]
const TOTAL = UNIQ_CODES.length
const GROUP_KEY = 'tayin_group'
let curGroup = GROUPS.find(g => g.id === localStorage.getItem(GROUP_KEY)) || GROUPS[0]

// 分区着色：每个分组一个色相，组内用 5 级色阶（浅→深）表等级，未踏用淡染色 p
const RAMPS = {
  jjjj: { r: ['#eaa9a6','#df7a77','#d44944','#a72c27','#731e1b'], p: '#ebdcdb', h: '#D6534E' },
  nmg: { r: ['#a5c2da','#75a1c6','#467eab','#315878','#223d53'], p: '#dbe1e7', h: '#5E8BB0' },
  dss: { r: ['#a9bee4','#7b9ad5','#4b76c6','#2f5395','#213967'], p: '#dce0e9', h: '#4F79C7' },
  suhu:     { r: ['#8ad3ca','#4bbbad','#358e82','#26635c','#1a453f'], p: '#d7e4e3', h: '#3fa79a' },  // 苏沪：青
  zhejiang: { r: ['#8ad3a5','#4bbb75','#358e56','#26633e','#1a4529'], p: '#d7e4dc', h: '#3fa766' },  // 浙江：青绿
  anhui:    { r: ['#8abfd3','#4b9cbb','#35768e','#265263','#1a3a45'], p: '#d7e0e4', h: '#3f8aa7' },  // 安徽：青蓝
  guangdong:{ r: ['#9cd394','#68bc5c','#46933c','#31672a','#22461d'], p: '#dae4d8', h: '#5fa855' },  // 广东：绿
  fujian:   { r: ['#bbd394','#98bc5c','#71933c','#4f672a','#37461d'], p: '#e0e4d8', h: '#88a855' },  // 福建：黄绿
  guangxi:  { r: ['#94d3ae','#5cbc83','#3c9360','#2a6744','#1d462e'], p: '#d8e4dc', h: '#55a877' },  // 广西：翠绿
  shandong: { r: ['#e2b773','#d0912b','#9c6c20','#6e4c16','#4c340f'], p: '#e7dfd2', h: '#e0a13c' },  // 山东：金
  henan:    { r: ['#e28e73','#d0552b','#9c3f20','#6e2c16','#4c1e0f'], p: '#e7d7d2', h: '#e0653c' },  // 河南：橙
  hunan:    { r: ['#c6b0df','#a886cd','#8759bb','#633b8f','#442863'], p: '#e2dde8', h: '#8e6fb0' },  // 湖南：紫
  hubei:    { r: ['#b0b5df','#868ccd','#5963bb','#3b438f','#282d63'], p: '#dddee8', h: '#6f75b0' },  // 湖北：蓝紫
  jiangxi:  { r: ['#dfb0df','#cd86cc','#bb59bb','#8f3b8e','#632863'], p: '#e8dde8', h: '#b06faf' },  // 江西：品紫
  chuanyu: { r: ['#e2b193','#d38659','#b15f2f','#7c4321','#552e16'], p: '#e8ded7', h: '#C56A34' },  // 川渝：赤陶红
  yunnan:  { r: ['#e8c483','#d6a244','#a87c2b','#76571d','#4f3b13'], p: '#eae2d1', h: '#D4A23E' },  // 云南：琥珀金
  guizhou: { r: ['#cbb59a','#a98d68','#836a48','#5b4931','#3d3020'], p: '#e5ded4', h: '#8E7048' },  // 贵州：褐灰
  qz: { r: ['#a3c3d9','#71a4c5','#4480a7','#305a75','#213e51'], p: '#dbe2e6', h: '#6C8A9E' },
  sgn: { r: ['#d7b695','#c28f5b','#9a6939','#6c4a28','#4a321b'], p: '#e6dfd8', h: '#A9743F' },
  xj: { r: ['#d7bb7a','#c09639','#90702b','#65501e','#453615'], p: '#e5dfd4', h: '#C9A24B' },
  hain: { r: ['#e4a7c0','#d5779d','#c5467a','#922e57','#641f3b'], p: '#e9dbe1', h: '#D67BA0' },
  twn: { r: ['#dca8cf','#c879b5','#b3499a','#7e346c','#57234a'], p: '#e7dbe4', h: '#9C5A8C' },
  gba: { r: ['#9ac8d6','#63abc0','#3e8599','#2c5d6c','#1e404b'], p: '#d9e3e5', h: '#4FA0B8' },
}
const NEUTRAL = ['#bfbbb8','#9c9892','#77716b','#534f4b','#393634']   // 全国图图例用；亮度与各区各级一致，只示深浅
// 把某分组的色阶写到 :root，图例与该组地图同时生效
function setRamp(ramp) {
  const root = document.documentElement.style
  for (let i = 0; i < 5; i++) root.setProperty(`--l${i + 1}`, ramp[i])
}

// 全国省级总览图（首页）。每个省块记录：进入哪个分组 + 该省成员州市 code
const CHINA = TILE_GEO.china
const GROUP_BY_ID = Object.fromEntries(GROUPS.map(g => [g.id, g]))
for (const r of CHINA.regions) {
  // 一个省的成员 = 各分组里同省的州市（广东跨 闽粤桂 + 大湾区，需汇总；去重）
  const seen = new Set()
  r._members = []
  for (const g of GROUPS) for (const x of g.regions)
    if (x.prov === r.prov && !seen.has(x.code)) { seen.add(x.code); r._members.push(x.code) }
}

// 州市的「有效等级」= 自己盖的印 与 县级印记最深一档 取大
function effLevel(code) {
  let lv = levels[code] || 0
  const d = DRILL[code]
  if (d) for (const r of d.regions) { const v = levels[r.code] || 0; if (v > lv) lv = v }
  return lv
}

// 省块聚合：颜色取全省「平均等级」（越多越深，反映整体探索）；进度 = 已踏/总数
function provAvg(r) {
  let sum = 0
  for (const c of r._members) sum += effLevel(c)
  return r._members.length ? sum / r._members.length : 0
}
function provProgress(r) {
  let touched = 0
  for (const c of r._members) if (effLevel(c) > 0) touched++
  return { touched, total: r._members.length }
}
// 平均值（0–5）在色阶 [淡染, l1…l5] 上连续插值 → 省色
function lerpHex(a, b, f) {
  const pa = [1, 3, 5].map(k => parseInt(a.slice(k, k + 2), 16))
  const pb = [1, 3, 5].map(k => parseInt(b.slice(k, k + 2), 16))
  return '#' + pa.map((v, k) => Math.round(v + (pb[k] - v) * f).toString(16).padStart(2, '0')).join('')
}
// 去过的省颜色（未踏在 refresh 里留纯白）：任何去过至少 l1（稍微深），再按平均加深到 l5
function provColor(r) {
  const avg = provAvg(r)
  const rm = RAMPS[r.group] || RAMPS.chuanyu
  const pos = Math.min(4, (avg / 5) * 4)   // 0..4 映射到 [l1…l5]
  const i = Math.floor(pos)
  return i >= 4 ? rm.r[4] : lerpHex(rm.r[i], rm.r[i + 1], pos - i)
}

const KEY = 'tayin_levels', TOKEN_KEY = 'tayin_token', USER_KEY = 'tayin_user'
let levels = {}
try { levels = JSON.parse(localStorage.getItem(KEY) || '{}') } catch {}

// ---------- 账号 ----------
let token = localStorage.getItem(TOKEN_KEY) || null
let username = localStorage.getItem(USER_KEY) || null
let visitedSpots = []   // 共享账号的已打卡景点（Sakura 侧），用于攻略进度展示

// 后端 API 地址。本地/同源部署留空；部署到 GitHub Pages 时改成后端地址，
// 例如 'https://api.yourdomain.com'（必须 https，且后端已开 CORS）。
const API_BASE = window.TAYIN_API || ''
async function api(path, method = 'GET', body) {
  const headers = { 'Content-Type': 'application/json' }
  if (token) headers.Authorization = `Bearer ${token}`
  const resp = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined })
  const data = await resp.json().catch(() => ({}))
  if (!resp.ok) throw Object.assign(new Error(data.error || `请求失败（${resp.status}）`), { status: resp.status })
  return data
}

let pushTimer = null
function save() {
  localStorage.setItem(KEY, JSON.stringify(levels))
  if (!token) return
  clearTimeout(pushTimer)
  pushTimer = setTimeout(() => {
    api('/api/user/me', 'PATCH', { regionLevels: levels }).catch(e => {
      if (e.status === 401) setAuth(null, null)  // 会话过期，退回本机模式
    })
  }, 400)
}

function setAuth(t, u) {
  token = t; username = u
  if (t) { localStorage.setItem(TOKEN_KEY, t); localStorage.setItem(USER_KEY, u) }
  else { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY) }
  renderUserbar()
}

function mergeLevels(a, b) {  // 取两边等级更深的一档
  const out = { ...a }
  for (const [k, v] of Object.entries(b)) if ((out[k] || 0) < v) out[k] = v
  return out
}

function renderUserbar() {
  const bar = document.getElementById('userbar')
  const hint = document.getElementById('storage-hint')
  if (username) {
    bar.innerHTML = `<span class="uname">${username}</span><button class="uicon" id="logout" title="退出" aria-label="退出">⏻</button>`
    hint.textContent = '已登录，印记同步到账号'
    document.getElementById('logout').onclick = () => {
      setAuth(null, null)   // JWT 无状态，清本地 token 即登出
    }
  } else {
    bar.innerHTML = `<button class="uauth" id="open-auth">登录 / 注册</button>`
    hint.textContent = '数据存于本机浏览器 · 未登录'
    document.getElementById('open-auth').onclick = () => {
      document.getElementById('auth-msg').textContent = ''
      document.getElementById('auth-mask').classList.add('open')
      document.getElementById('auth-user').focus()
    }
  }
}

const svg = document.getElementById('map')
const NS = 'http://www.w3.org/2000/svg'

let shapes = {}, labels = {}, marks = {}, fracs = {}
let view = { mode: 'group', parent: null }   // mode: 'group' ｜ 'drill'（钻进某州市的下级图）

// 大区探索进度：已踏子单位数 / 子单位总数（无钻取数据返回 null）
function drillProgress(code) {
  const d = DRILL[code]
  if (!d) return null
  let touched = 0
  for (const r of d.regions) if ((levels[r.code] || 0) > 0) touched++
  return { touched, total: d.regions.length }
}
const FRAC_MIN_CELLS = 6   // 只有够大的块放得下名字下方的 a/b

// ---------- 悬停高亮 + 全名提示（专治小块认不出）----------
// 注意：不能在 mouseenter 里移动/缩放被悬停的节点——DOM 重排会重算悬停状态，
// 造成 enter/leave 死循环（块闪烁、点击丢失）。高亮只用描边+亮度，识别靠 tooltip。
const tip = document.getElementById('tip')
function hoverOn(r, path) { path.classList.add('hl') }
function hoverOff(path) { path.classList.remove('hl') }
function tipHTML(r) {
  if (view.mode === 'china') {
    const p = provProgress(r)
    return `${r.name}<small>${p.touched > 0 ? '已踏 ' + p.touched + '/' + p.total : '未踏 · 点击进入'}</small>`
  }
  const lv = view.mode === 'drill' ? (levels[r.code] || 0) : effLevel(r.code)
  const lab = (LEVELS.find(l => l.v === lv) || {}).label?.split(' · ')[0] || '未踏'
  const extra = DRILL[r.code] ? ' · 可细分' : ''
  return `${r.name}<small>${lab}${extra}</small>`
}
function showTip(r, e) { tip.innerHTML = tipHTML(r); tip.classList.add('show'); moveTip(e) }
function hideTip() { tip.classList.remove('show') }
function moveTip(e) {
  tip.style.left = Math.min(e.clientX + 14, innerWidth - tip.offsetWidth - 8) + 'px'
  tip.style.top = Math.max(8, e.clientY - tip.offsetHeight - 12) + 'px'
}

// ---------- 地图缩放 / 平移（手机双指、＋/－ 按钮）----------
let vp = null                 // 变换层（<g>），缩放平移作用于它
let zoom = { s: 1, x: 0, y: 0 }
function applyZoom() {
  if (vp) vp.setAttribute('transform', `translate(${zoom.x} ${zoom.y}) scale(${zoom.s})`)
  const zoomed = zoom.s > 1.01
  svg.style.touchAction = zoomed ? 'none' : 'pan-y'   // 放大后单指平移地图，否则让页面滚
  svg.style.cursor = zoomed ? 'grab' : ''             // 放大后鼠标可拖拽
  const out = document.getElementById('zoom-out'); if (out) out.style.opacity = zoomed ? '1' : '.4'
}
function resetZoom() { zoom = { s: 1, x: 0, y: 0 }; applyZoom() }
function clampZoom() {
  const vb = svg.viewBox.baseVal
  zoom.x = Math.min(vb.x * (1 - zoom.s), Math.max((vb.x + vb.width) * (1 - zoom.s), zoom.x))
  zoom.y = Math.min(vb.y * (1 - zoom.s), Math.max((vb.y + vb.height) * (1 - zoom.s), zoom.y))
}
function toVB(px, py) {
  const sr = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal
  return { x: vb.x + (px - sr.left) / sr.width * vb.width, y: vb.y + (py - sr.top) / sr.height * vb.height }
}
function zoomTo(ns, v) {
  ns = Math.max(1, Math.min(6, ns))
  const cx = (v.x - zoom.x) / zoom.s, cy = (v.y - zoom.y) / zoom.s
  zoom.s = ns; zoom.x = v.x - cx * ns; zoom.y = v.y - cy * ns
  clampZoom(); applyZoom()
}
function panBy(dpx, dpy) {
  const sr = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal
  zoom.x += dpx / sr.width * vb.width; zoom.y += dpy / sr.height * vb.height
  clampZoom(); applyZoom()
}
function zoomStep(f) { const vb = svg.viewBox.baseVal; zoomTo(zoom.s * f, { x: vb.x + vb.width / 2, y: vb.y + vb.height / 2 }) }
const _dist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY)
const _mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 })
let tState = null, tMoved = false, gestureBlockClick = false
svg.addEventListener('touchstart', e => {
  if (e.touches.length === 2) tState = { pinch: true, d: _dist(e.touches[0], e.touches[1]) }
  else if (e.touches.length === 1) tState = { pinch: false, x: e.touches[0].clientX, y: e.touches[0].clientY }
  tMoved = false
}, { passive: false })
svg.addEventListener('touchmove', e => {
  if (!tState) return
  if (tState.pinch && e.touches.length === 2) {
    const d = _dist(e.touches[0], e.touches[1]), m = _mid(e.touches[0], e.touches[1])
    zoomTo(zoom.s * d / tState.d, toVB(m.x, m.y)); tState.d = d; tMoved = true; e.preventDefault()
  } else if (!tState.pinch && e.touches.length === 1 && zoom.s > 1.01) {
    const t = e.touches[0]
    panBy(t.clientX - tState.x, t.clientY - tState.y); tState.x = t.clientX; tState.y = t.clientY
    tMoved = true; e.preventDefault()
  }
}, { passive: false })
svg.addEventListener('touchend', () => { if (tMoved) { gestureBlockClick = true; setTimeout(() => gestureBlockClick = false, 400) } tState = null })
svg.addEventListener('click', e => { if (gestureBlockClick) { e.stopPropagation(); e.preventDefault() } }, true)
document.getElementById('zoom-in').onclick = () => zoomStep(1.5)
document.getElementById('zoom-out').onclick = () => zoomStep(1 / 1.5)
{ const ht = document.getElementById('help-toggle'), hp = document.getElementById('foot-help')
  ht.onclick = () => { const open = hp.hidden; hp.hidden = !open; ht.textContent = open ? '用法 ▴' : '用法 ▾' } }
// 桌面：放大后鼠标拖动平移
let mDrag = null
svg.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'mouse' || zoom.s <= 1.01) return
  mDrag = { x: e.clientX, y: e.clientY }; tMoved = false; svg.style.cursor = 'grabbing'
  try { svg.setPointerCapture(e.pointerId) } catch {}
})
svg.addEventListener('pointermove', e => {
  if (!mDrag) return
  panBy(e.clientX - mDrag.x, e.clientY - mDrag.y); mDrag = { x: e.clientX, y: e.clientY }; tMoved = true
})
svg.addEventListener('pointerup', () => {
  if (!mDrag) return
  mDrag = null; svg.style.cursor = zoom.s > 1.01 ? 'grab' : ''
  if (tMoved) { gestureBlockClick = true; setTimeout(() => gestureBlockClick = false, 30) }
})

// ---------- A/B 测试开关（URL 参数，默认关）：?corner=cut 斜角轮廓 / ?font=serif 切回宋体地名 ----------
const AB = new URLSearchParams(location.search)
const CORNER_CUT = AB.get('corner') === 'cut'
if (AB.get('font') === 'serif') document.body.classList.add('font-serif')
// 把积木轮廓的直角切成 45° 斜角：去共线点后，每个拐角用「入向缩 t + 出向进 t」两点替代
function chamferPath(d, t) {
  return d.split('Z').filter(s => s.trim()).map(seg => {
    const pts = seg.replace(/[ML]/g, ' ').trim().split(/\s+/).map(p => p.split(',').map(Number))
    const core = []
    for (let i = 0; i < pts.length; i++) {
      const a = pts[(i + pts.length - 1) % pts.length], b = pts[i], c = pts[(i + 1) % pts.length]
      if ((b[0] - a[0]) * (c[1] - b[1]) - (b[1] - a[1]) * (c[0] - b[0]) !== 0) core.push(b)   // 只留真拐角
    }
    const out = []
    for (let i = 0; i < core.length; i++) {
      const p = core[i], prev = core[(i + core.length - 1) % core.length], next = core[(i + 1) % core.length]
      const di = [Math.sign(p[0] - prev[0]), Math.sign(p[1] - prev[1])]
      const dn = [Math.sign(next[0] - p[0]), Math.sign(next[1] - p[1])]
      out.push([p[0] - di[0] * t, p[1] - di[1] * t], [p[0] + dn[0] * t, p[1] + dn[1] * t])
    }
    return 'M' + out.map(p => p[0] + ',' + p[1]).join('L') + 'Z'
  }).join('')
}

function buildMap(grid) {
  hideTip()   // 换图时旧块已移除，mouseleave 不会触发，这里兜底收掉提示
  const [bx0, by0, bx1, by1] = grid.bbox
  svg.setAttribute('viewBox', `-2 -2 ${(bx1 - bx0) * CELL + 4} ${(by1 - by0) * CELL + 4}`)
  svg.innerHTML = ''
  vp = document.createElementNS(NS, 'g'); svg.appendChild(vp); resetZoom()
  // 两层渲染：所有块在下、所有文字在上——任何名字都不会被后画的邻块盖住（如上海的「上」）
  const gPath = document.createElementNS(NS, 'g'), gText = document.createElementNS(NS, 'g')
  gText.setAttribute('pointer-events', 'none')
  vp.appendChild(gPath); vp.appendChild(gText)
  shapes = {}; labels = {}; marks = {}; fracs = {}
  // 字号按「屏幕像素」定：各图缩放比不同（全国图缩得很小），统一到易读的屏幕字号。
  // 不读 svg.clientHeight——换图瞬间它可能是旧图/动画中的坏值；改用窗口尺寸推算（与 CSS max-height 对应）
  const vbW = (bx1 - bx0) * CELL + 4, vbH = (by1 - by0) * CELL + 4
  const maxVH = innerWidth <= 640 ? 0.66 : innerWidth <= 900 ? 0.72 : 0.86
  const stageW = Math.min(1040, (document.querySelector('.stage')?.clientWidth || innerWidth - 24))
  const scale = Math.min(stageW / vbW, innerHeight * maxVH / vbH) || 0.5
  const fs = px => +(px / scale).toFixed(1)   // 目标屏幕 px → svg 单位
  const scalePath = d => d.replace(/([\d.]+),([\d.]+)/g, (_, x, y) =>
    `${((+x) - bx0) * CELL},${((+y) - by0) * CELL}`)
  for (const r of grid.regions) {
    const path = document.createElementNS(NS, 'path')
    const pd = scalePath(r.d)
    path.setAttribute('d', CORNER_CUT ? chamferPath(pd, CELL * 0.32) : pd)
    path.setAttribute('class', 'cellpoly')
    path.setAttribute('fill-rule', 'evenodd')
    path.addEventListener('click', e => {
      if (r.group) { enterGroup(r); return }   // 全国图：点省缩放进分组
      openPopup(e, r)   // 地级市 / 香港统一弹菜单，进细分走标题栏胶囊或双击
    })
    path.addEventListener('mouseenter', e => { hoverOn(r, path); showTip(r, e) })
    path.addEventListener('mousemove', moveTip)
    path.addEventListener('mouseleave', () => { hoverOff(path); hideTip() })
    gPath.appendChild(path)
    shapes[r.code] = path

    // 字号按标签落点的「局部」空间自适应：hr/vr = 构建时算好的块内最大内接矩形宽高。
    // 横排放不下而竖向宽裕时改竖排（上海/陕西这类 1 格宽细条，中文竖排天然合适）
    const len = Math.max(r.name.length, 1)
    const hrPx = (r.hr || 2) * CELL * scale, vrPx = (r.vr || 2) * CELL * scale
    const basePx = len >= 5 ? 9.5 : len >= 4 ? 10.5 : len >= 3 ? 12 : 13.5
    const fontH = Math.min(basePx, vrPx * 0.8, hrPx * 1.02 / len)
    const fontV = Math.min(basePx, hrPx * 0.95, vrPx * 0.95 / len)
    const vertical = len > 1 && fontV > fontH * 1.15   // 竖排明显更优才用
    const namePx = Math.max(9, vertical ? fontV : fontH)
    // a/b 分数：除了块够大，还要求标签处纵向真放得下两行，否则名字会被顶出块外
    const bigDrill = !vertical && (DRILL[r.code] || r.group) && r.n >= FRAC_MIN_CELLS && vrPx >= namePx + 12
    const t = document.createElementNS(NS, 'text')
    const tx = (r.lx - bx0) * CELL
    t.setAttribute('x', tx)
    t.setAttribute('y', (r.ly - by0) * CELL - (bigDrill ? fs(6) : 0))
    t.setAttribute('font-size', fs(namePx))
    t.setAttribute('class', 'rlabel')
    if (vertical) {
      for (let i = 0; i < len; i++) {
        const sp = document.createElementNS(NS, 'tspan')
        sp.textContent = r.name[i]
        sp.setAttribute('x', tx)
        sp.setAttribute('dy', i === 0 ? `${-(len - 1) / 2}em` : '1em')
        t.appendChild(sp)
      }
    } else t.textContent = r.name
    gText.appendChild(t)
    labels[r.code] = t

    if (bigDrill) {
      const f = document.createElementNS(NS, 'text')
      f.setAttribute('x', (r.lx - bx0) * CELL)
      f.setAttribute('y', (r.ly - by0) * CELL + fs(7))
      f.setAttribute('font-size', fs(9.5))
      f.setAttribute('class', 'dfrac')
      gText.appendChild(f)
      fracs[r.code] = f
    }

    if (GUIDES[r.code]) {
      // 攻略角标：标签格左上角 📖（右上角留给可钻取标记）
      const g = document.createElementNS(NS, 'text')
      g.setAttribute('x', (Math.floor(r.lx) - bx0) * CELL + 2.5)
      g.setAttribute('y', (Math.floor(r.ly) - by0) * CELL + fs(5))
      g.setAttribute('font-size', fs(5.5))
      g.setAttribute('class', 'gmark')
      g.textContent = '📖'
      gText.appendChild(g)
    }

    if (DRILL[r.code]) {
      // 可钻取角标：放在标签所在格的右上角（必属本单位，不会飘到邻块上）
      const m = document.createElementNS(NS, 'text')
      m.setAttribute('x', (Math.floor(r.lx) + 1 - bx0) * CELL - 2.5)
      m.setAttribute('y', (Math.floor(r.ly) - by0) * CELL + fs(4.5))
      m.setAttribute('font-size', fs(5))
      m.setAttribute('class', 'dmark')
      m.textContent = '▦'
      gText.appendChild(m)
      marks[r.code] = m
      path.addEventListener('dblclick', () => { popup.classList.remove('open'); enterDrill(r) })
    }
  }
}

  const pillStyle = `background:${hue};box-shadow:0 0 0 3px ${hue}2e,0 0 16px ${hue}8c,0 1px 4px rgba(0,0,0,.18)`

function refresh() {
  let total = 0, touched = 0
  for (const code of UNIQ_CODES) {
    const lv = effLevel(code)
    total += lv; if (lv > 0) touched++
  }
  const regions = view.mode === 'china' ? CHINA.regions
    : view.mode === 'drill' ? DRILL[view.parent.code].regions : curGroup.regions
  for (const r of regions) {
    // 全国图用「平均等级」连续上色（round 后仅供标签明暗对比）；分组/县级用该块自身等级
    const lv = view.mode === 'china' ? Math.round(provAvg(r))
      : view.mode === 'drill' ? (levels[r.code] || 0) : effLevel(r.code)
    shapes[r.code].setAttribute('class', `cellpoly lv${lv}`)
    // 全国图：未踏留纯白（清 inline，回落 CSS 的 --land），去过按平均色
    if (view.mode === 'china') shapes[r.code].style.fill = provProgress(r).touched > 0 ? provColor(r) : ''
    labels[r.code].setAttribute('class', `rlabel lv${lv}`)
    if (marks[r.code]) marks[r.code].setAttribute('class', `dmark lv${lv}`)
    if (fracs[r.code]) {
      const p = view.mode === 'china' ? provProgress(r) : drillProgress(r.code)
      // 仅踏过 ≥1 个子单位才显示 a/b，否则留白只见名字
      fracs[r.code].textContent = p && p.touched > 0 ? `${p.touched}/${p.total}` : ''
      fracs[r.code].setAttribute('class', `dfrac lv${lv}`)
    }
  }
  document.getElementById('score').textContent = total
  document.getElementById('touched').textContent = touched
  document.getElementById('totaln').textContent = TOTAL
  renderTabs()
  updateCrumb()
}

// ---------- 钻取：语义缩放进出 ----------
let animating = false
const ZOOM_MS = 200

// 某单位色块中心在 svg 元素内的像素坐标（transform-origin 用；用 BCR 以兼容缩放/平移）
function blockOriginPx(code) {
  const br = shapes[code].getBoundingClientRect(), sr = svg.getBoundingClientRect()
  return `${br.left + br.width / 2 - sr.left}px ${br.top + br.height / 2 - sr.top}px`
}

function animOut(transform, origin, cb) {
  animating = true
  svg.style.transformOrigin = origin
  svg.style.transition = `transform ${ZOOM_MS}ms ease-in, opacity ${ZOOM_MS}ms ease-in`
  svg.style.transform = transform
  svg.style.opacity = '0'
  setTimeout(cb, ZOOM_MS + 10)
}
function animIn(startTransform, origin) {
  svg.style.transition = 'none'
  svg.style.transformOrigin = origin
  svg.style.transform = startTransform
  svg.style.opacity = '0'
  svg.getBoundingClientRect()  // 强制 reflow，让起始态生效
  svg.style.transition = `transform ${ZOOM_MS}ms ease-out, opacity ${ZOOM_MS}ms ease-out`
  svg.style.transform = 'scale(1)'
  svg.style.opacity = '1'
  setTimeout(() => { svg.style.cssText = ''; animating = false }, ZOOM_MS + 40)
}

function enterDrill(parent) {
  if (animating || !DRILL[parent.code]) return
  const origin = blockOriginPx(parent.code)
  animOut('scale(2.3)', origin, () => {   // 镜头推进：母图放大淡出
    renderDrill(parent); refresh()
    animIn('scale(0.45)', '50% 50%')      // 子图从小长到 1，接住推进感
  })
}
function exitDrill() {
  if (view.mode !== 'drill' || animating) return
  const parent = view.parent
  animOut('scale(0.45)', '50% 50%', () => {  // 镜头拉远：子图缩小淡出
    renderGroup(); refresh()
    animIn('scale(2.3)', blockOriginPx(parent.code))  // 母图从母块处收回原位
  })
}
// 全国图 → 分组：点省缩放进入
function enterGroup(province) {
  if (animating) return
  curGroup = GROUP_BY_ID[province.group]
  localStorage.setItem(GROUP_KEY, curGroup.id)
  const origin = blockOriginPx(province.code)
  animOut('scale(2.3)', origin, () => {
    renderGroup(); refresh()
    animIn('scale(0.45)', '50% 50%')
  })
}
// 分组 → 全国：拉远回总览
function exitToChina() {
  if (view.mode !== 'group' || animating) return
  animOut('scale(0.45)', '50% 50%', () => {
    renderChina(); refresh()
    animIn('scale(2.3)', '50% 50%')
  })
}

const authMask = document.getElementById('auth-mask')

async function submitAuth(mode) {
  const user = document.getElementById('auth-user').value.trim()
  const pass = document.getElementById('auth-pass').value
  const msg = document.getElementById('auth-msg')
  msg.textContent = ''
  try {
    // 共享账号后端（与 Sakura Tour 同一用户库）：
    // login 用 email 字段承载「用户名或邮箱」；register 时 name=email=输入值
    const path = mode === 'login' ? '/api/auth/login' : '/api/auth/register'
    const body = mode === 'login'
      ? { email: user, password: pass }
      : { name: user, email: user, password: pass }
    const data = await api(path, 'POST', body)
    setAuth(data.token, data.user.name)
    visitedSpots = data.user.visitedSpots || []
    // 首次登录：本机印记与账号印记按更深一档合并，再回写账号
    levels = mergeLevels(data.user.regionLevels || {}, levels)
    save(); refresh()
    authMask.classList.remove('open')
    document.getElementById('auth-pass').value = ''
  } catch (e) {
    msg.textContent = e.message
  }
}
document.getElementById('auth-login').onclick = () => submitAuth('login')
document.getElementById('auth-register').onclick = () => submitAuth('register')
document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth('login') })

  if (!token) return
  try {
    const data = await api('/api/user/me')
    username = data.name

    levels = data.regionLevels || {}
    localStorage.setItem(KEY, JSON.stringify(levels))

    if (e.status === 401) { setAuth(null, null); refresh() }
  }
}

let _fontCss   // 缓存内联字体（首次导出时抓一次）
async function inlineFont() {
  if (_fontCss != null) return _fontCss
  try {
    const serif = document.body.classList.contains('font-serif')
    const url = serif ? './serif-map.woff2?v=3' : './round-map.woff2?v=1'
    const fam = serif ? 'MapSerif' : 'MapRound', wt = serif ? 900 : 700
    const u8 = new Uint8Array(await (await fetch(url)).arrayBuffer())
    let bin = ''; for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i])
    _fontCss = `@font-face{font-family:'${fam}';font-weight:${wt};src:url(data:font/woff2;base64,${btoa(bin)}) format('woff2')}`
  } catch { _fontCss = '' }
  return _fontCss
}
function svgToImage(str) {
  return new Promise((res, rej) => {
    const img = new Image()
    img.onload = () => res(img); img.onerror = rej
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(str)
  })
}

function drawLegend(ctx, x, y, W) {
  const rows = [...document.querySelectorAll('#legend .lg-row')]
  if (!rows.length) return 0
  ctx.font = "700 13px 'PingFang SC','Microsoft YaHei',sans-serif"
  ctx.textBaseline = 'middle'
  const items = rows.map(r => ({ bg: getComputedStyle(r.querySelector('.lg-sw')).backgroundColor, t: r.textContent.replace(/\s+/g, ' ').trim() }))
  const wOf = it => 20 + ctx.measureText(it.t).width + 15
  const total = items.reduce((s, it) => s + wOf(it), 0)
  let cx = x + Math.max(0, (W - total) / 2)   // 居中
  const cy = y + 15
  for (const it of items) {
    ctx.fillStyle = it.bg; ctx.strokeStyle = '#1B2430'; ctx.lineWidth = 1.2
    ctx.fillRect(cx, cy - 7, 16, 12); ctx.strokeRect(cx, cy - 7, 16, 12)
    cx += 20
    ctx.fillStyle = '#1B2430'; ctx.fillText(it.t, cx, cy)

}
async function renderShareCanvas() {
  const svg = document.getElementById('map'), vb = svg.viewBox.baseVal
  const clone = svg.cloneNode(true)
  const oEls = svg.querySelectorAll('*'), cEls = clone.querySelectorAll('*')
  const props = ['fill', 'stroke', 'stroke-width', 'stroke-linejoin', 'opacity', 'font-family', 'font-size', 'font-weight', 'text-anchor', 'dominant-baseline', 'letter-spacing']
  for (let i = 0; i < oEls.length; i++) {
    const cs = getComputedStyle(oEls[i])
    for (const p of props) cEls[i].style.setProperty(p, cs.getPropertyValue(p))
  }
  clone.querySelectorAll('.dmark').forEach(e => e.remove())   // ▦ 只是交互提示，静态图里去掉
  clone.querySelector('g')?.removeAttribute('transform')   // 复位缩放，导出整图
  clone.style.transform = ''
  const st = document.createElementNS(NS, 'style'); st.textContent = await inlineFont()
  clone.insertBefore(st, clone.firstChild)
  clone.setAttribute('width', vb.width); clone.setAttribute('height', vb.height); clone.setAttribute('xmlns', NS)
  const mapImg = await svgToImage(new XMLSerializer().serializeToString(clone))

  const S = 2, PAD = 22, titleH = 62
  const mapW = Math.min(760, Math.max(360, vb.width))
  const mapH = mapW * vb.height / vb.width
  const legVisible = getComputedStyle(document.getElementById('legend')).display !== 'none'
  const legendH = legVisible ? 30 : 0
  const qr = await qrImage()
  const footerH = qr ? 78 : 30
  const W = Math.max(mapW, 380) + PAD * 2
  const H = PAD + titleH + legendH + mapH + 4 + footerH
  const cv = document.createElement('canvas')
  cv.width = W * S; cv.height = H * S
  const ctx = cv.getContext('2d'); ctx.scale(S, S)
  ctx.fillStyle = getComputedStyle(document.body).backgroundColor || '#E7E0D0'
  ctx.fillRect(0, 0, W, H)
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic'
  ctx.fillStyle = '#1B2430'; ctx.font = "700 25px 'Songti SC','PingFang SC',serif"
  ctx.fillText('踏印 · 中国打卡地图', PAD, PAD + 24)
  ctx.fillStyle = '#A9702F'; ctx.font = "700 15px 'PingFang SC','Microsoft YaHei',sans-serif"
  ctx.fillText(shareSubtitle(), PAD, PAD + 46)
  let y = PAD + titleH
  if (legVisible) y += drawLegend(ctx, PAD, y, W - PAD * 2)
  ctx.drawImage(mapImg, (W - mapW) / 2, y, mapW, mapH)
  if (qr) {
    // 右下角：白底小卡 + 二维码，左侧配站点与扫码提示
    const qs = 58, qx = W - PAD - qs - 5, qy = H - footerH + (footerH - qs) / 2 - 3
    ctx.fillStyle = '#FFFDF8'
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(qx - 6, qy - 6, qs + 12, qs + 12, 7); ctx.fill() }
    else ctx.fillRect(qx - 6, qy - 6, qs + 12, qs + 12)
    ctx.strokeStyle = 'rgba(27,36,48,.25)'; ctx.lineWidth = 1
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(qx - 6, qy - 6, qs + 12, qs + 12, 7); ctx.stroke() }
    ctx.drawImage(qr, qx, qy, qs, qs)
    ctx.textAlign = 'right'
    ctx.fillStyle = '#1B2430'; ctx.font = "700 13px 'PingFang SC','Microsoft YaHei',sans-serif"
    ctx.fillText('tayin.digitalvio.shop', qx - 16, qy + qs / 2 - 4)
    ctx.fillStyle = 'rgba(88,101,114,.85)'; ctx.font = "600 11.5px 'PingFang SC',sans-serif"
    ctx.fillText('扫码 · 记录你的中国足迹', qx - 16, qy + qs / 2 + 15)
  } else {
    ctx.fillStyle = 'rgba(88,101,114,.8)'; ctx.font = "600 12px 'PingFang SC',sans-serif"
    ctx.textAlign = 'right'; ctx.fillText('tayin.digitalvio.shop', W - PAD, H - 10)
  }
  return cv
}

let _busy = false
async function withBusy(fn) {
  if (_busy) return
  _busy = true
  const btns = [document.getElementById('save-img'), document.getElementById('share-img')]
  btns.forEach(b => b.disabled = true)
  try { await fn() } catch (e) { toast('生成失败，请重试') }
  finally { _busy = false; btns.forEach(b => b.disabled = false) }
}

/* SSO：从 Sakura 带 #sso=code 跳来 → 换 token 自动登录 */
async function redeemSso() {
  const m = location.hash.match(/^#sso=([a-f0-9]{48})$/)
  if (!m) return false
  history.replaceState(null, '', location.pathname + location.search)
  try {
    const data = await api('/api/auth/sso-redeem', 'POST', { code: m[1] })
    setAuth(data.token, data.user.name)
    visitedSpots = data.user.visitedSpots || []
    levels = mergeLevels(data.user.regionLevels || {}, levels)
    save(); refresh()
    return true
  } catch { return false }
}
